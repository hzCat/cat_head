<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫咪画廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #fff3e0 50%, #e8f5e9 100%);
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe Print', cursive, sans-serif;
      padding: 40px 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 12px;
    }

    .card {
      background: #fffdf7;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(255, 111, 145, 0.15), 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      border: 3px solid #fff;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 16px 40px rgba(255, 111, 145, 0.25), 0 4px 12px rgba(0, 0, 0, 0.1);
      border-color: #ffccd9;
    }

    .card-image {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      background: #f5f0eb;
    }



    /* 装饰元素 - 卡通风格小爪子 */
    .gallery::before,
    .gallery::after {
      content: '🐾';
      position: absolute;
      font-size: 2.5em;
      opacity: 0.15;
      pointer-events: none;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      body {
        padding: 20px 12px;
      }

      .header h1 {
        font-size: 2em;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
      }

      .card-image {
        height: 160px;
      }
    }

    @media (min-width: 960px) {
      .gallery {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>


  <div class="gallery">
    <div class="card">
      <img class="card-image" src="cat/0.jpg" alt="猫咪 1" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/1.jpg" alt="猫咪 2" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/2.jpg" alt="猫咪 3" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/3.jpg" alt="猫咪 4" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/4.jpg" alt="猫咪 5" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/5.jpg" alt="猫咪 6" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/6.jpg" alt="猫咪 7" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/7.jpg" alt="猫咪 8" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/8.jpg" alt="猫咪 9" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/9.jpg" alt="猫咪 10" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/10.jpg" alt="猫咪 11" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/11.jpg" alt="猫咪 12" loading="lazy">
    </div>
    <div class="card">
      <img class="card-image" src="cat/12.jpg" alt="猫咪 13" loading="lazy">
    </div>
  </div>
</body>
</html>
